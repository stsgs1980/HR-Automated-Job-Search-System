<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    .header { padding: 20px 16px 16px; text-align: center; }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #059669, #10B981); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .logo svg { stroke: #fff; fill: none; stroke-width: 2; }
    .title { font-size: 15px; font-weight: 700; color: #18181b; }
    .subtitle { font-size: 11px; color: #71717a; margin-top: 4px; }
    .body { padding: 0 16px 16px; }
    .hint { font-size: 12px; color: #52525B; line-height: 1.6; text-align: center; padding: 16px; background: #FAFAFA; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
    .hint b { color: #059669; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; margin-top: 12px; background: #059669; color: #fff; transition: background 0.15s; }
    .btn:hover { background: #047857; }
    .footer { padding: 10px 16px; text-align: center; font-size: 10px; color: #a1a1aa; border-top: 1px solid #f4f4f5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="title">HH Copilot</div>
    <div class="subtitle">v1.7.3</div>
  </div>
  <div class="body">
    <div class="hint">
      Панель управления доступна на страницах <b>hh.ru</b> через зелёную кнопку FAB в правом нижнем углу.
    </div>
    <a class="btn" href="https://hh.ru" target="_blank">Открыть hh.ru</a>
  </div>
  <div class="footer">HH Copilot &mdash; автоматизация откликов</div>
</body>
</html>
